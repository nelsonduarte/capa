name: Bug report
description: Report something that the compiler does wrong (analyzer, parser, transpiler, runtime).
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting. If your report concerns a **security**
        issue (a way to bypass the capability discipline, escape
        attenuation, or compromise the analyzer), please do **not**
        file it here, use the private channel described in
        [SECURITY.md](https://github.com/nelsonduarte/capa/blob/main/SECURITY.md).

        For everything else, the fastest path to a fix is a minimal
        reproduction. Please fill in every required field.

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal `.capa` program that reproduces the issue
      description: |
        The smallest program that exhibits the problem. Strip
        anything unrelated. Paste the source directly, please don't
        link to an external file.
      render: capa
      placeholder: |
        fun main(stdio: Stdio)
            stdio.println("...")
    validations:
      required: true

  - type: dropdown
    id: stage
    attributes:
      label: Which stage of the compiler is involved?
      options:
        - "Lexer (tokenisation)"
        - "Parser (AST construction)"
        - "Analyzer (name resolution, types, capability discipline)"
        - "Transpiler (Python code generation)"
        - "Runtime (Stdio, Fs, Net, Result, ...)"
        - "CLI"
        - "I am not sure"
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command you ran and its output
      description: |
        The full `python -m capa ...` invocation and what it
        printed (or how it crashed).
      render: shell
      placeholder: |
        $ python -m capa --check repro.capa
        ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: capa_version
    attributes:
      label: Capa version (`git rev-parse HEAD` or release tag)
      placeholder: "v0.2.0-alpha, commit 32ea43d"
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python version (`python --version`)
      placeholder: "Python 3.12.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - "Linux"
        - "macOS"
        - "Windows"
        - "Other (please describe in additional context)"
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: |
        Anything else that might help, when the bug started
        happening, related issues, hypotheses you ruled out.
    validations:
      required: false
